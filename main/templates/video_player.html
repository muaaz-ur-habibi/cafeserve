{% extends 'base.html' %}

{% block head %}
<style>
    .video-container {
        max-width: 1000px;
        margin: 0 auto;
    }

    video {
        width: 100%;
        height: auto;
        background: #000;
    }
</style>
<head>
  <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />

  <!-- If you'd like to support IE8 (for Video.js versions prior to v7) -->
  <!-- <script src="https://vjs.zencdn.net/ie8/1.1.2/videojs-ie8.min.js"></script> -->
</head>
{% endblock %}

{% block body %}
<div class="container">
    <h2>Video Player</h2>
    <hr>
    <p>{{ path }}</p>

    <!--
    <div class="video-container">
        <video controls autoplay>
            <source src="{{ url_for('routes.get_file', name=name, path=dm.urlify(path, True)) }}" type="video/mp4">
            Your browser is stupid
        </video>
    </div>
    -->
    <div class="video-container">
        <center>
            <video
                id="my-video"
                class="video-js"
                controls
                preload="auto"
                width="640"
                height="264"
                data-setup="{}"
            >
                <source src="{{ url_for('routes.get_file', name=name, path=dm.urlify(path, True)) }}" type="video/webm" />
                <p class="vjs-no-js">
                To view this video please enable JavaScript, and consider upgrading to a
                web browser that
                <a href="https://videojs.com/html5-video-support/" target="_blank"
                    >supports HTML5 video</a
                >
                </p>
            </video>
        </center>
    </div>

  <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
</div>
{% endblock %}
